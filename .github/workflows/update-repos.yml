name: Update repos.json

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/update-repos.yml

permissions:
  contents: write

jobs:
  update-repos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch repositories and write data/repos.json
        env:
          # GITHUB_TOKEN is scoped to this repo only; do not use it for
          # other repos' public APIs or those requests return 404.
          GITHUB_USER: kltt-l
        run: |
          set -euo pipefail
          API_HEADER=(-H "Accept: application/vnd.github+json" -H "User-Agent: kltt-l-repos-updater")

          PAGE=1
          REPOS="[]"
          while true; do
            RESPONSE=$(curl -sf "${API_HEADER[@]}" \
              "https://api.github.com/users/${GITHUB_USER}/repos?type=owner&sort=updated&per_page=100&page=${PAGE}")
            COUNT=$(echo "$RESPONSE" | jq 'length')
            if [ "$COUNT" -eq 0 ]; then
              break
            fi
            REPOS=$(jq -s 'add' <<< "$REPOS"$'\n'"$RESPONSE")
            if [ "$COUNT" -lt 100 ]; then
              break
            fi
            PAGE=$((PAGE + 1))
          done

          echo "$REPOS" | jq '[.[] | {
            name: .name,
            full_name: .full_name,
            html_url: .html_url,
            description: .description,
            language: .language,
            updated_at: .updated_at,
            default_branch: .default_branch,
            owner: { login: .owner.login }
          }]' > data/repos.json

          jq -c '.[] | select(.name | test("^Notes?";"i")) | [.full_name, .default_branch] | @tsv' data/repos.json \
          | while IFS=$'\t' read -r FULL BRANCH; do
              NAME="${FULL#*/}"
              TREE_JSON=$(curl -sf "${API_HEADER[@]}" \
                "https://api.github.com/repos/${FULL}/git/trees/${BRANCH}?recursive=1" || true)
              if [ -z "$TREE_JSON" ]; then
                echo "Warning: skip md_files for ${FULL} (tree fetch failed)"
                continue
              fi
              MD_FILES=$(echo "$TREE_JSON" | jq '[.tree[]? | select(.type == "blob") | .path | select(test("\\.md$";"i")) | select(test("(^|/)README\\.md$";"i") | not)]')
              jq --arg name "$NAME" --argjson files "$MD_FILES" \
                'map(if .name == $name then . + {md_files: $files} else . end)' \
                data/repos.json > data/repos.tmp.json
              mv data/repos.tmp.json data/repos.json
            done

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/repos.json
          if git diff --staged --quiet; then
            echo "No changes in data/repos.json"
            exit 0
          fi
          git commit -m "chore: update repos.json from GitHub"
          git push
